name: Release

# Builds the macOS (.dmg) and Windows (.exe) installers in the cloud and
# attaches them — plus the signed updater manifest — to a GitHub Release.
#
# Trigger by pushing a version tag that matches the app version, e.g.:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of your ~/.tauri/sports-window.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key's password (empty string if none)
# These let the build produce the signed `latest.json`/`.sig` the in-app
# updater verifies against the public key in tauri.conf.json. Without them the
# build fails, because createUpdaterArtifacts is enabled.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Sports Window ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install. Unsigned build — see the README for the one-time SmartScreen/Gatekeeper step.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
